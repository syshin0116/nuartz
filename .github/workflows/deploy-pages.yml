name: Deploy to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build nuartz package
        run: bun run --cwd packages/nuartz build

      - name: Enable static export
        run: |
          sed -i 's|// output: "export"|output: "export"|' apps/web/next.config.ts

      - name: Run prebuild static script
        run: bun run apps/web/scripts/prebuild-static.ts

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build Next.js
        run: bun run --cwd apps/web build
        env:
          NEXT_PUBLIC_SITE_URL: ""

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/out

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
